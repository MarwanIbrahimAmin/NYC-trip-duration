RANDOM_STATE: 42

drop_columns:
  - "id"
  - "pickup_datetime"
  - "store_and_fwd_flag"
  - "hour"
  - "month"
  - "day_of_week"

use_polynomial: False
polynomial:
  degree: 2
  include_bias: False

use_scaling: True
scaling:
  # type: standard
  # type: minmax
  type: robust
  # type: maxabs

Model:

  LinearRegression:
    fit_intercept: True

  Ridge:
    fit_intercept: True
    alpha: 10.0
    solver: 'auto'
    positive: False

  XGBoost:
    n_estimators: 600
    max_depth: 7
    learning_rate: 0.03
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 2.0   
    objective: 'reg:squarederror'

  NeuralNetwork:
    hidden_layer_sizes: [128, 64, 32] 
    activation: 'relu'
    solver: 'adam'
    alpha: 0.001
    learning_rate_init: 0.002
    max_iter: 500
    batch_size: 256 
    early_stopping: True
    n_iter_no_change: 15

  Lasso:
    fit_intercept: True
    alpha: 0.01
    positive: False
    max_iter: 2000

  LightGBM:         
    n_estimators: 800
    max_depth: 8
    num_leaves: 63
    learning_rate: 0.03
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 2.0
    n_jobs: -1
    objective: 'regression'

save_paths:
  models_dir: "Modeling/Saved_Models"
  preprocessor_path: "Modeling/Saved_Models/preprocessor.joblib"
